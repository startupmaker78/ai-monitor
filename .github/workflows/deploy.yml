name: Deploy to Yandex Cloud (staging)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-staging
  cancel-in-progress: true

env:
  YC_FOLDER_ID: b1gldbqt279ed94nrnpt
  YC_REGISTRY_ID: crps6cjjiemm3isfdt50
  YC_RUNTIME_SA_ID: aje8vk01bgb0ij6rfgan
  YC_CONTAINER_NAME: webmonitor-staging
  YC_LOCKBOX_SECRET_ID: e6q7u31vmglihgr4658s
  IMAGE_REPO: webmonitor

jobs:
  deploy:
    name: Build, push, deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install and configure yc CLI
        env:
          SA_KEY: ${{ secrets.YC_SA_JSON_CREDENTIALS }}
        run: |
          curl -sSL https://storage.yandexcloud.net/yandexcloud-yc/install.sh | bash -s -- -i $HOME/yc -n
          echo "$HOME/yc/bin" >> $GITHUB_PATH
          export PATH="$HOME/yc/bin:$PATH"
          KEY_FILE=$(mktemp)
          trap "rm -f $KEY_FILE" EXIT
          printf '%s' "$SA_KEY" > "$KEY_FILE"
          yc config profile create sa-profile
          yc config set service-account-key "$KEY_FILE"
          yc config set folder-id ${{ env.YC_FOLDER_ID }}

      - name: Configure Docker auth via yc CLI
        run: yc container registry configure-docker

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            cr.yandex/${{ env.YC_REGISTRY_ID }}/${{ env.IMAGE_REPO }}:${{ github.sha }}
            cr.yandex/${{ env.YC_REGISTRY_ID }}/${{ env.IMAGE_REPO }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy Serverless Container revision via yc CLI
        run: |
          SECRET_ARGS=""
          for k in DATABASE_URL AUTH_SECRET AUTH_URL \
                   YOS_BUCKET_NAME YOS_ENDPOINT YOS_REGION \
                   YOS_ACCESS_KEY_ID YOS_SECRET_ACCESS_KEY YOS_PUBLIC_URL \
                   ANTHROPIC_API_KEY \
                   METRIKA_CLIENT_ID METRIKA_CLIENT_SECRET \
                   YOOKASSA_SHOP_ID YOOKASSA_SECRET_KEY \
                   RESEND_API_KEY IP_HASH_SALT; do
            SECRET_ARGS="$SECRET_ARGS --secret id=${{ env.YC_LOCKBOX_SECRET_ID }},key=$k,environment-variable=$k"
          done

          eval yc serverless container revision deploy \
            --container-name ${{ env.YC_CONTAINER_NAME }} \
            --image cr.yandex/${{ env.YC_REGISTRY_ID }}/${{ env.IMAGE_REPO }}:${{ github.sha }} \
            --cores 1 \
            --memory 512MB \
            --core-fraction 100 \
            --concurrency 8 \
            --execution-timeout 30s \
            --service-account-id ${{ env.YC_RUNTIME_SA_ID }} \
            $SECRET_ARGS

      - name: Smoke test deployed container
        run: |
          CONTAINER_URL="https://bbarn8gnskqll4cjnkhm.containers.yandexcloud.net"

          echo "=== Health check ==="
          sleep 10
          curl -fsS -o /tmp/health.json -w "Status: %{http_code}\n" \
            "$CONTAINER_URL/api/health" || (echo "HEALTH FAILED"; cat /tmp/health.json; exit 1)
          cat /tmp/health.json

          echo ""
          echo "=== Landing / ==="
          curl -fsS -o /dev/null -w "Status: %{http_code}\n" "$CONTAINER_URL/" \
            || (echo "LANDING FAILED"; exit 1)

          echo ""
          echo "=== /login ==="
          curl -fsS -o /dev/null -w "Status: %{http_code}\n" "$CONTAINER_URL/login" \
            || (echo "LOGIN FAILED"; exit 1)

          echo ""
          echo "=== /signup ==="
          curl -fsS -o /dev/null -w "Status: %{http_code}\n" "$CONTAINER_URL/signup" \
            || (echo "SIGNUP FAILED"; exit 1)

          echo ""
          echo "✅ All smoke tests passed"
